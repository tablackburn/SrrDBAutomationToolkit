name: Delete merged bot branches

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    if: >
      github.event.pull_request.merged == true &&
      (github.event.pull_request.user.login == 'pre-commit-ci[bot]' ||
       github.event.pull_request.user.login == 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}"
          else
            echo "Branch does not exist (already deleted)."
          fi
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
