name: Delete merged bot branches

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    if: >
      github.event.pull_request.merged == true &&
      (github.event.pull_request.user.login == 'pre-commit-ci[bot]' ||
       github.event.pull_request.user.login == 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        run: |
          if ! response=$(gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}" 2>&1); then
            if echo "$response" | grep -q -E "Reference does not exist|422"; then
              echo "Branch does not exist (already deleted)."
            else
              echo "Error deleting branch: $response"
              exit 1
            fi
          fi
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
